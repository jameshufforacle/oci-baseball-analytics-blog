title: Baseball Analytics Platform on OCI
description: Canonical Resource Manager stack for the Part 1 platform foundation.
schemaVersion: 1.1.0
version: "20260623-canon-aligned"
locale: en

variableGroups:
  - title: OCI Placement
    variables:
      - region
      - tenancy_ocid
      - compartment_ocid
  - title: Project
    variables:
      - project_name
      - environment
  - title: Network
    variables:
      - vcn_cidr_block
      - functions_subnet_cidr_block
  - title: Autonomous Data Warehouse
    variables:
      - adb_admin_password
      - adb_db_name
      - adb_ecpu_count
      - adb_storage_tbs
  - title: Oracle Analytics Cloud
    variables:
      - oac_idcs_access_token
      - oac_olpu_count
  - title: Notifications
    variables:
      - notification_email

variables:
  region:
    title: OCI Region
    type: string
    required: true
    default: us-ashburn-1

  tenancy_ocid:
    title: Root Tenancy OCID
    type: string
    required: true

  compartment_ocid:
    title: Platform Compartment OCID
    type: string
    required: true

  project_name:
    title: Project Name
    type: string
    required: true
    default: bb-analytics

  environment:
    title: Environment
    type: string
    required: true
    default: demo

  vcn_cidr_block:
    title: VCN CIDR Block
    type: string
    required: true
    default: 10.42.0.0/16

  functions_subnet_cidr_block:
    title: Private Functions Subnet CIDR Block
    type: string
    required: true
    default: 10.42.10.0/24

  adb_admin_password:
    title: ADB ADMIN Password
    type: password
    required: true

  adb_db_name:
    title: ADB Database Name
    type: string
    required: true
    default: BBADBDEMO

  adb_ecpu_count:
    title: ADB ECPU Count
    type: integer
    required: true
    default: 4

  adb_storage_tbs:
    title: ADB Storage TB
    type: integer
    required: true
    default: 1

  oac_idcs_access_token:
    title: OAC IDCS Access Token
    description: Required sensitive token used by Resource Manager to provision OAC.
    type: password
    required: true

  oac_olpu_count:
    title: OAC OLPU Count
    type: integer
    required: true
    default: 1

  notification_email:
    title: Notification Email
    type: string
    required: false
    default: ""
